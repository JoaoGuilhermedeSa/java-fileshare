services:
  postgres:
    image: postgres:17-alpine
    container_name: fileshare-postgres
    environment:
      POSTGRES_DB: fileshare
      POSTGRES_USER: fileshare
      POSTGRES_PASSWORD: fileshare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fileshare"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
