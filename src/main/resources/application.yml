spring:
  application:
    name: fileshare

  datasource:
    url: jdbc:postgresql://localhost:5432/fileshare
    username: fileshare
    password: fileshare

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Enable virtual threads (Project Loom — Java 21+)
  threads:
    virtual:
      enabled: true

  # Allow large file uploads; actual limit is storage/memory available
  servlet:
    multipart:
      enabled: true
      max-file-size: 10GB
      max-request-size: 10GB


fileshare:
  storage:
    # Root directory for encrypted files on disk. Override via env: FILESHARE_STORAGE_ROOT_DIR
    root-dir: ${user.home}/fileshare-data

  encryption:
    # CHANGE THESE before any real use — generate with: openssl rand -base64 32
    passphrase: "change-me-in-production-use-a-long-random-string"
    # 16-byte salt, base64-encoded. Generate: openssl rand -base64 16
    salt: "dGhpcyBpcyBhIHNhbHQ="

server:
  port: 8080
